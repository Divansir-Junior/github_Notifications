name: Notify Discord

on:
  workflow_call:
    inputs:
      title:
        required: true
        type: string

      message:
        required: true
        type: string

    secrets:
      DISCORD_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send to Discord
        env:
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import urllib.request
          import urllib.error
          import sys

          payload = {
              "content": None,
              "embeds": [
                  {
                      "title": os.environ["TITLE"],
                      "description": os.environ["MESSAGE"]
                  }
              ]
          }

          data = json.dumps(payload).encode("utf-8")

          req = urllib.request.Request(
              os.environ["WEBHOOK"],
              data=data,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "GitHub-Actions-Discord-Webhook"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as response:
                  print("Discord status:", response.status)
          except urllib.error.HTTPError as e:
              print("Discord error status:", e.code)
              print("Discord response:", e.read().decode("utf-8"))
              sys.exit(1)
          EOF
