name: Notify Discord

on:
  workflow_call:
    inputs:
      title:
        required: true
        type: string
      message:
        required: true
        type: string
    secrets:
      DISCORD_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Debug webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: echo "Tamanho ${#WEBHOOK} URL $WEBHOOK"

      - name: Send to Discord
        env:
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os
          data = json.dumps({"embeds": [{"title": os.environ["TITLE"], "description": os.environ["MESSAGE"]}]})
          req = urllib.request.Request(os.environ["WEBHOOK"], data=data.encode(), headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req)
          EOF
